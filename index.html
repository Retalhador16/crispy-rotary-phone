<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mini Whats</title>
  <link rel="icon" href="data:,">
  <style>
    body { margin:0; font-family:Arial; background:#111b21; color:white; }
    header { background:#075e54; padding:15px; text-align:center; font-size:22px; font-weight:bold; }
    .aviso { background:#222; padding:8px; text-align:center; font-size:12px; color:#ccc; }
    #topo { padding:10px; background:#202c33; display:flex; gap:8px; }
    #chat { height:calc(100vh - 180px); overflow-y:auto; padding:15px; }
    .msg { background:#202c33; padding:10px; margin:8px 0; border-radius:10px; max-width:75%; }
    .nome { color:#25d366; font-weight:bold; }
    .hora, .ip { font-size:11px; color:#aaa; margin-top:5px; }
    footer { display:flex; padding:10px; background:#202c33; gap:8px; }
    input { padding:12px; border:none; border-radius:8px; font-size:15px; }
    #nome { width:130px; }
    #texto { flex:1; }
    button { background:#25d366; border:none; border-radius:8px; padding:12px; font-weight:bold; cursor:pointer; }
    .danger { background:#ff4444; color:white; margin-top:6px; }
    .adminBtn { background:#444; color:white; }
  </style>
</head>
<body>

<header>Mini Whats</header>

<div id="topo">
  <input id="nome" placeholder="Seu nome">
  <button class="adminBtn" onclick="entrarAdmin()">Admin</button>
</div>

<div id="chat"></div>

<footer>
  <input id="texto" placeholder="Digite sua mensagem">
  <button onclick="enviar()">Enviar</button>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    onChildRemoved,
    remove,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGzcFqPl11TWMo1G1UvucLV0yu4Lqo5mA",
    authDomain: "resolute-grin-299416.firebaseapp.com",
    databaseURL: "https://resolute-grin-299416-default-rtdb.firebaseio.com",
    projectId: "resolute-grin-299416",
    storageBucket: "resolute-grin-299416.firebasestorage.app",
    messagingSenderId: "940287622486",
    appId: "1:940287622486:web:f5595d9ec35f6acc91aaf7"
  };

  const SENHA_ADMIN = "1016"; // TROQUE AQUI

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const mensagensRef = ref(db, "mensagens");

  const chat = document.getElementById("chat");
  const nomeInput = document.getElementById("nome");
  const textoInput = document.getElementById("texto");

  let admin = localStorage.getItem("admin") === "true";
  let ipUsuario = "não detectado";

  async function pegarIP() {
    try {
      const r = await fetch("https://api.ipify.org?format=json");
      const d = await r.json();
      ipUsuario = d.ip;
    } catch {
      ipUsuario = "erro ao detectar";
    }
  }

  pegarIP();

  window.entrarAdmin = function () {
    const senha = prompt("Digite a senha de admin:");

    if (senha === SENHA_ADMIN) {
      localStorage.setItem("admin", "true");
      alert("Modo admin ativado!");
      location.reload();
    } else {
      alert("Senha incorreta.");
    }
  };

  window.enviar = function () {
    const nome = nomeInput.value.trim() || "Anônimo";
    const texto = textoInput.value.trim();

    if (texto === "") return;

    localStorage.setItem("nome", nome);

    push(mensagensRef, {
      nome: nome,
      texto: texto,
      ip: ipUsuario,
      hora: serverTimestamp()
    });

    textoInput.value = "";
  };

  window.apagarMensagem = function (id) {
    if (!admin) return;

    if (confirm("Apagar esta mensagem?")) {
      remove(ref(db, "mensagens/" + id));
    }
  };

  textoInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") enviar();
  });

  nomeInput.value = localStorage.getItem("nome") || "";

  onChildAdded(mensagensRef, function(snapshot) {
    const msg = snapshot.val();
    const id = snapshot.key;

    const data = msg.hora ? new Date(msg.hora) : new Date();
    const horaFormatada = data.toLocaleTimeString("pt-BR", {
      hour: "2-digit",
      minute: "2-digit"
    });

    const div = document.createElement("div");
    div.className = "msg";
    div.id = "msg-" + id;

    div.innerHTML = `
      <div class="nome">${msg.nome}</div>
      <div>${msg.texto}</div>
      <div class="hora">${horaFormatada}</div>
      ${admin ? `<div class="ip">IP: ${msg.ip || "não salvo"}</div>` : ""}
      ${admin ? `<button class="danger" onclick="apagarMensagem('${id}')">Apagar</button>` : ""}
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  onChildRemoved(mensagensRef, function(snapshot) {
    const div = document.getElementById("msg-" + snapshot.key);
    if (div) div.remove();
  });
</script>

</body>
</html>
